schema_version: 1

context:
  name: fricas
  version: 1.3.13

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/fricas/fricas/releases/download/${{ version }}/fricas-${{ version }}-full.tar.bz2
  sha256: dd4d5e06db0ba4a43a5bfb64e94f6c8d4b10e68ac65a77556891a6b24af148a2

build:
  number: 0

requirements:
  build:
    - if: unix
      then:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - make
    - if: win
      then:
        - ${{ compiler('m2w64_c') }}
        - ${{ stdlib('m2w64_c') }}
        - m2-base
        - m2-diffutils
        - m2-make
  host:
    - sbcl
    - zstd
  run:
    - sbcl

tests:
  - script:
      - fricas -nox -eval ")qu"

about:
  summary: an advanced computer algebra system
  description: |
    FriCAS is an advanced computer algebra system. Its capabilities range from
    calculus (integration and differentiation) to abstract algebra. It can plot
    functions and has integrated help system.
  license: BSD-3-Clause
  license_file: LICENSE.txt
  homepage: https://fricas.org
  repository: https://groups.google.com/g/fricas-devel
  documentation: https://fricas.org/index0.html

extra:
  recipe-maintainers:
    - mantepse
    - saraedum
